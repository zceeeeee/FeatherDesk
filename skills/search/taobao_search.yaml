id: taobao_search
name: 淘宝商品搜索
type: domain
triggers:
  - 淘宝
  - taobao
  - 商品
  - 价格
  - 店铺
  - 搜索
url_patterns:
  - "*.taobao.com"
domain: taobao
description: "搜索淘宝商品，展示前三张图片、前五个商品明细，并生成价格统计与频数直方图"
version: "2.1.0"
examples:
  - "淘宝搜索蓝牙耳机"
  - "在淘宝上找手机壳，给出价格统计"
parameters:
  keyword:
    type: string
    required: true
    description: "要搜索的商品关键词"
steps:
  - action: goto
    args:
      url: "https://login.taobao.com/member/login.jhtml"
    comment: "先打开淘宝登录页，确认登录完成后才能继续"
  - action: goto
    args:
      url: "https://s.taobao.com/search?q={{keyword}}"
    comment: "确认登录成功后打开淘宝商品搜索结果页"
