id: xiaohongshu_publish
name: 小红书发布
type: domain
description: 小红书发布功能，支持文字配图/上传图片、上传视频、写长文；文字配图可选择卡片样式，发布前可按需定时发布。
version: "1.1.0"

triggers:
  # Main triggers
  - 小红书
  - xiaohongshu
  - xhs
  - rednote
  # Upload image triggers
  - 上传图文
  - 上传图片
  - 发布图文
  - 发布短文
  - 发帖
  - 发布帖子
  - 图片地址
  # Upload video triggers
  - 上传视频
  - 视频地址
  # Write article triggers
  - 写长文
  - 写文章
  - 写小说
  - 长文
  # Common triggers
  - 发布
  - 投稿
  - 图文
  - 笔记
  - 内容
  - 文案
  - 标题
  - 正文
  - 文字配图
  - 生成图片
  - 预览图片
  - 样式
  - 基础
  - 弥散
  - 涂写
  - 光影
  - 手写
  - 备忘
  - 图片编辑
  - 定时发布
  - 下一步
  - 新的创作
  - 一键排版

url_patterns:
  - xiaohongshu.com
  - "*.xiaohongshu.com"
  - creator.xiaohongshu.com

domain: xiaohongshu

parameters:
  keyword:
    type: string
    required: false
    description: 要发布的内容或文案（用于文字配图模式）。
  title:
    type: string
    required: false
    description: 标题（可选），触发词为"标题"。
  body:
    type: string
    required: false
    description: 正文/内容（可选），触发词为"正文"或"内容"。
  image_path:
    type: string
    required: false
    description: 本地图片地址，触发词为"图片地址是"，如"D:\xxx\xxx.jpg"。
  video_path:
    type: string
    required: false
    description: 本地视频地址，触发词为"视频地址是"，如"D:\xxx\xxx.mp4"。
  phone_number:
    type: string
    required: false
    description: 未登录时使用的手机号，例如 13574133406。
  mode:
    type: string
    required: false
    description: |
      发布模式，不指定时自动检测：
      - text_to_image: 文字配图模式（默认，无图片/视频时）
      - image_upload: 上传图片模式（提供图片地址时）
      - video: 上传视频模式（提供视频地址时）
      - article: 写长文模式（触发词包含"长文"/"文章"/"小说"时）
  cover_style:
    type: string
    required: false
    description: 文字配图预览页要选择的卡片样式，可选基础、弥散、涂写、光影、手写、备忘、边框、便签、涂鸦、简约；未给出或未命中时默认基础。
  enable_schedule:
    type: boolean
    required: false
    description: 用户提到定时发布时启用。
  schedule_time:
    type: string
    required: false
    description: 定时发布时间，例如 2026-07-01 11:17；用户未给出具体时间则不填写。
  publish_url:
    type: string
    required: false
    description: 小红书创作者发布 URL。

steps:
  - action: goto
    args:
      url: "https://www.xiaohongshu.com/login"
    comment: 进入小红书登录页，检查是否出现手机号登录。

  - action: smart_fill
    target: phone
    value: "{{phone_number}}"
    comment: 未登录且用户给出手机号时填写手机号。
    on_error: continue

  - action: smart_click
    target: get_code
    comment: 未登录时点击获取验证码，验证码由用户手动输入。
    on_error: continue

  - action: wait_for_text
    target: about_us
    value: 关于我们
    comment: 等待页面左下角出现"关于我们"，确认登录成功。
    on_error: stop

  - action: wait_for_text
    target: me_button
    value: 我
    comment: 跳转发布页前必须识别到侧边栏或底部导航的"我"，确认账号已登录。
    on_error: stop

  - action: goto
    args:
      url: "{{publish_url}}"
    comment: 按模式进入图片、视频或长文发布页。

  # ============== 文字配图模式 ==============
  - action: smart_click
    target: text_to_image
    comment: text_to_image 模式点击"文字配图"，填写内容后点击"生成图片"。
    on_error: continue

  - action: smart_fill
    target: publish_content
    value: "{{keyword}}"
    comment: 填写正文、图文内容或长文内容。
    on_error: continue

  - action: wait
    args:
      seconds: 2
    comment: 填入文本内容后等待 2 秒，再点击生成图片。

  - action: smart_click
    target: generate_image
    comment: text_to_image 模式点击"生成图片"。
    on_error: continue

  - action: smart_click
    target: cover_style
    value: "{{cover_style}}"
    comment: 出现"预览图片"后选择卡片样式；未指定或未命中时默认基础。
    on_error: continue

  # ============== 上传图片模式 ==============
  - action: smart_click
    target: upload_image
    comment: image_upload 模式点击"上传图片"，再上传本地图片。
    on_error: continue

  # ============== 上传视频模式 ==============
  - action: smart_click
    target: upload_video
    comment: video 模式点击"上传视频"，上传本地视频后发布前等待 10 秒。
    on_error: continue

  # ============== 写长文模式 ==============
  - action: smart_click
    target: new_creation
    comment: article 模式点击"新的创作"。
    on_error: continue

  - action: smart_fill
    target: title_input
    value: "{{title}}"
    comment: 用户提供标题时填写；长文未提供标题时使用默认标题。
    on_error: continue

  - action: smart_fill
    target: article_content
    value: "{{body}}"
    comment: 填写正文内容。
    on_error: continue

  - action: smart_click
    target: format_button
    comment: article 模式点击"一键排版"。
    on_error: continue

  # ============== 通用步骤 ==============
  - action: smart_click
    target: next_step
    comment: 图片预览/长文排版后点击"下一步"。
    on_error: continue

  - action: smart_click
    target: scheduled_publish
    value: "{{enable_schedule}}"
    comment: 用户要求定时发布时点击"定时发布"开关。
    on_error: continue

  - action: smart_fill
    target: schedule_time
    value: "{{schedule_time}}"
    comment: 用户给出具体定时发布时间时填写日期时间。
    on_error: continue

  - action: smart_click
    target: final_publish
    comment: 点击底部红色"发布"按钮。
    on_error: stop
