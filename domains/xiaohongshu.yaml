name: xiaohongshu
base_url: https://www.xiaohongshu.com/login
locators:
  phone:
    css:
      - "input[placeholder*='手机号']"
      - "input[placeholder*='手机']"
      - "input[type='tel']"
      - "input[name*='phone' i]"
      - "input[name*='mobile' i]"
    xpath:
      - "//input[contains(@placeholder, '手机号') or contains(@placeholder, '手机')]"

  verification_code:
    css:
      - "input[placeholder*='验证码']"
      - "input[name*='code' i]"
    xpath:
      - "//input[contains(@placeholder, '验证码')]"

  agreement:
    css:
      - "input[type='checkbox']"
      - "text=我已阅读并同意"
      - "text=登录即同意"
    xpath:
      - "//*[contains(normalize-space(.), '用户协议')]/ancestor::*[.//input[@type='checkbox']][1]//input[@type='checkbox']"
      - "//*[contains(normalize-space(.), '隐私政策')]/ancestor::*[.//input[@type='checkbox']][1]//input[@type='checkbox']"

  get_code:
    css:
      - "input[placeholder*='验证码'] ~ *:has-text('发送验证码')"
      - "input[placeholder*='验证码'] + *:has-text('发送验证码')"
      - "input[placeholder*='验证码'] ~ *:has-text('获取验证码')"
      - "input[placeholder*='验证码'] + *:has-text('获取验证码')"
      - "text=获取验证码"
      - "text=发送验证码"
      - "button:has-text('获取验证码')"
      - "button:has-text('发送验证码')"
      - "[role='button']:has-text('获取验证码')"
      - "[role='button']:has-text('发送验证码')"
    xpath:
      - "//input[contains(@placeholder, '验证码')]/following::*[self::button or @role='button' or self::div or self::span][contains(normalize-space(.), '发送验证码') and not(contains(normalize-space(.), '收不到'))][1]"
      - "//input[contains(@placeholder, '验证码')]/following::*[self::button or @role='button' or self::div or self::span][contains(normalize-space(.), '获取验证码') and not(contains(normalize-space(.), '收不到'))][1]"
      - "//*[self::button or @role='button' or self::div or self::span][contains(normalize-space(.), '获取验证码') and not(contains(normalize-space(.), '收不到'))]"
      - "//*[self::button or @role='button' or self::div or self::span][contains(normalize-space(.), '发送验证码') and not(contains(normalize-space(.), '收不到'))]"

  login_button:
    css:
      - "text=登录"
      - "text=登 录"
      - "button:has-text('登录')"
      - "[role='button']:has-text('登录')"

  about_us:
    css:
      - "text=关于我们"
      - "a:has-text('关于我们')"
      - "div:has-text('关于我们')"
      - "span:has-text('关于我们')"
    xpath:
      - "//*[contains(normalize-space(.), '关于我们')]"

  me_button:
    css:
      - "li.user .channel:has-text('我')"
      - "a[href*='/user/profile/'] .channel:has-text('我')"
      - "a.bottom-channel .text:has-text('我')"
      - ".bottom-channel .text:has-text('我')"
    xpath:
      - "//*[contains(concat(' ', normalize-space(@class), ' '), ' user ')]//*[normalize-space(.)='我']"
      - "//a[contains(@href, '/user/profile/')]//*[normalize-space(.)='我']"

  text_to_image:
    css:
      - "text=文字配图"
      - "button:has-text('文字配图')"
      - "[role='button']:has-text('文字配图')"
      - "[role='tab']:has-text('文字配图')"
      - "div:has-text('文字配图')"
      - "span:has-text('文字配图')"
    xpath:
      - "//*[self::button or @role='button' or @role='tab' or self::div or self::span][contains(normalize-space(.), '文字配图')]"

  publish_content:
    css:
      - "p.editor-paragraph"
      - ".editor-paragraph"
      - "textarea[placeholder*='内容']"
      - "textarea[placeholder*='正文']"
      - "textarea[placeholder*='文案']"
      - "textarea[placeholder*='笔记']"
      - "[contenteditable='true'][data-placeholder*='内容']"
      - "[contenteditable='true'][data-placeholder*='正文']"
      - "[contenteditable='true']"
      - "[role='textbox']"
      - ".ql-editor"
      - ".ProseMirror"
    xpath:
      - "//p[contains(concat(' ', normalize-space(@class), ' '), ' editor-paragraph ')]"
      - "//textarea[contains(@placeholder, '内容') or contains(@placeholder, '正文') or contains(@placeholder, '文案') or contains(@placeholder, '笔记')]"
      - "//*[@contenteditable='true' or @role='textbox'][contains(@data-placeholder, '内容') or contains(@data-placeholder, '正文') or contains(@data-placeholder, '文案') or contains(@data-placeholder, '笔记')]"

  generate_image:
    css:
      - "span.edit-text-button-text:has-text('生成图片')"
      - ".edit-text-button-text:has-text('生成图片')"
      - "text=生成图片"
      - "button:has-text('生成图片')"
      - "[role='button']:has-text('生成图片')"
      - "div:has-text('生成图片')"
      - "span:has-text('生成图片')"
    xpath:
      - "//span[contains(concat(' ', normalize-space(@class), ' '), ' edit-text-button-text ')][contains(normalize-space(.), '生成图片')]"
      - "//*[self::button or @role='button' or self::div or self::span][contains(normalize-space(.), '生成图片')]"

  preview_image:
    css:
      - "text=预览图片"
      - "h1:has-text('预览图片')"
      - "h2:has-text('预览图片')"
      - "div:has-text('预览图片')"
      - "span:has-text('预览图片')"
    xpath:
      - "//*[contains(normalize-space(.), '预览图片')]"

  next_step:
    css:
      - "text=下一步"
      - "button:has-text('下一步')"
      - "[role='button']:has-text('下一步')"
      - "div:has-text('下一步')"
      - "span:has-text('下一步')"
    xpath:
      - "//*[self::button or @role='button' or self::div or self::span][contains(normalize-space(.), '下一步')]"

  image_edit:
    css:
      - "text=图片编辑"
      - "h1:has-text('图片编辑')"
      - "h2:has-text('图片编辑')"
      - "div:has-text('图片编辑')"
      - "span:has-text('图片编辑')"
    xpath:
      - "//*[contains(normalize-space(.), '图片编辑')]"

  final_publish:
    css:
      - "xhs-publish-btn[submit-text='发布'][submit-disabled='false']"
      - "xhs-publish-btn[is-publish='true'][submit-disabled='false']"
      - "button.ce-btn.bg-red:has-text('发布')"
      - "button.bg-red:has-text('发布')"
      - "text=发布"
      - "button:has-text('发布')"
      - "[role='button']:has-text('发布')"
      - "div:has-text('发布')"
      - "span:has-text('发布')"
    xpath:
      - "//xhs-publish-btn[@submit-text='发布' and @submit-disabled='false']"
      - "//*[self::button or @role='button' or self::div or self::span][contains(normalize-space(.), '发布')]"
